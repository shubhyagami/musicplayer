const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ============================================================
   HOOKS  (unchanged)

function useSongDatabase() {
  const [songs, setSongs] = useState([]);
  const [filteredSongs, setFilteredSongs] = useState([]);
  const [folderName, setFolderName] = useState('');
  const [isLoaded, setIsLoaded] = useState(false);
  const [loading, setLoading] = useState(false);
  const [loadProgress, setLoadProgress] = useState({ current: 0, total: 0 });
  const songsRef = useRef([]);

  const clearSongs = useCallback(function() {
    songsRef.current.forEach(function(s) {
      URL.revokeObjectURL(s.blobUrl);
      if (s.albumArtUrl) URL.revokeObjectURL(s.albumArtUrl);
    });
    songsRef.current = [];
    setSongs([]);
    setFilteredSongs([]);
    setIsLoaded(false);
    setFolderName('');
  }, []);

  const loadFolder = useCallback(async function() {
    clearSongs();
    setLoading(true);
    setLoadProgress({ current: 0, total: 0 });

    var result = await window.pickFolder();
    if (!result) result = await window.pickFolderFallback();
    if (!result) { setLoading(false); return; }

    setFolderName(result.folderName);

    var loadedSongs = await window.processAudioFiles(result.files, function(cur, total) {
      setLoadProgress({ current: cur, total: total });
    });

    songsRef.current = loadedSongs;
    setSongs(loadedSongs);
    setFilteredSongs([].concat(loadedSongs));
    setIsLoaded(true);
    setLoading(false);
  }, [clearSongs]);

  const loadLocalFolder = useCallback(async function() {
    setLoading(true);
    setLoadProgress({ current: 0, total: 0 });

    var result = await window.scanLocalMusicDir(function(cur, total) {
      setLoadProgress({ current: cur, total: total });
    });

    if (!result || !result.songs || result.songs.length === 0) {
      setLoading(false);
      return;
    }

    songsRef.current = result.songs;
    setSongs(result.songs);
    setFilteredSongs([].concat(result.songs));
    setFolderName(result.folderName || 'LOCAL MUSIC');
    setIsLoaded(true);
    setLoading(false);
  }, []);

  const searchSongs = useCallback(function(query) {
    if (!query.trim()) {
      setFilteredSongs([].concat(songsRef.current));
      return;
    }
    var q = query.toLowerCase().trim();
    setFilteredSongs(
      songsRef.current.filter(function(s) {
        return s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q);
      })
    );
  }, []);

  return {
    songs: songs, filteredSongs: filteredSongs, folderName: folderName,
    isLoaded: isLoaded, loading: loading, loadProgress: loadProgress,
    loadFolder: loadFolder, loadLocalFolder: loadLocalFolder, searchSongs: searchSongs, songsRef: songsRef
  };
}

function useAudioEngine(songs) {
  var audioRef = useRef(null);
  var audioCtxRef = useRef(null);
  var sourceRef = useRef(null);
  var gainRef = useRef(null);
  var analyserRef = useRef(null);
  var eqFiltersRef = useRef({});
  var spatialRef = useRef({});
  var isSeekingRef = useRef(false);

  var getPersisted = function(key, fallback) {
    try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; }
  };
  var setPersisted = function(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) {}
  };

  var [playerState, setPlayerState] = useState({
    currentIndex: -1,
    isPlaying: false,
    shuffle: false,
    repeatMode: 'off',
    volume: getPersisted('player-volume', 0.8),
    eq: getPersisted('eq-settings', { bass: 0, mid: 0, treble: 0 }),
    spatial: getPersisted('spatial-settings', 0)
  });

  var [timeInfo, setTimeInfo] = useState({ current: 0, duration: 0 });
  var [currentSong, setCurrentSong] = useState(null);
  var stateRef = useRef(playerState);
  stateRef.current = playerState;

  var initAudioCtx = useCallback(function() {
    if (audioCtxRef.current) return;
    var audio = audioRef.current;
    if (!audio) return;

    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var src = ctx.createMediaElementSource(audio);
    var gain = ctx.createGain();
    var analyser = ctx.createAnalyser();
    analyser.fftSize = 256;

    var bass = ctx.createBiquadFilter();
    bass.type = 'lowshelf'; bass.frequency.value = 200;
    var mid = ctx.createBiquadFilter();
    mid.type = 'peaking'; mid.frequency.value = 1000; mid.Q.value = 1;
    var treble = ctx.createBiquadFilter();
    treble.type = 'highshelf'; treble.frequency.value = 6000;

    bass.gain.value = stateRef.current.eq.bass;
    mid.gain.value = stateRef.current.eq.mid;
    treble.gain.value = stateRef.current.eq.treble;

    var splitter = ctx.createChannelSplitter(2);
    var merger = ctx.createChannelMerger(2);

    var midL = ctx.createGain(); midL.gain.value = 0.5;
    var midR = ctx.createGain(); midR.gain.value = 0.5;
    var midSum = ctx.createGain(); midSum.gain.value = 1.0;

    var sideL = ctx.createGain(); sideL.gain.value = 0.5;
    var sideRNeg = ctx.createGain(); sideRNeg.gain.value = -0.5;
    var sideSum = ctx.createGain(); sideSum.gain.value = 1.0;
    var widthGain = ctx.createGain();
    widthGain.gain.value = 1.0 + stateRef.current.spatial * 0.015;

    var mixL_M = ctx.createGain(); mixL_M.gain.value = 1.0;
    var mixL_S = ctx.createGain(); mixL_S.gain.value = 1.0;
    var mixR_M = ctx.createGain(); mixR_M.gain.value = 1.0;
    var mixR_S_neg = ctx.createGain(); mixR_S_neg.gain.value = -1.0;

    splitter.connect(midL, 0);
    splitter.connect(midR, 1);
    splitter.connect(sideL, 0);
    splitter.connect(sideRNeg, 1);

    midL.connect(midSum);
    midR.connect(midSum);
    sideL.connect(sideSum);
    sideRNeg.connect(sideSum);

    midSum.connect(mixL_M);
    midSum.connect(mixR_M);
    sideSum.connect(widthGain);
    widthGain.connect(mixL_S);
    widthGain.connect(mixR_S_neg);

    mixL_M.connect(merger, 0, 0);
    mixL_S.connect(merger, 0, 0);
    mixR_M.connect(merger, 0, 1);
    mixR_S_neg.connect(merger, 0, 1);

    var convolver = ctx.createConvolver();
    convolver.buffer = createImpulseResponse(ctx, 1.5, 2.0);
    var reverbGain = ctx.createGain();
    reverbGain.gain.value = stateRef.current.spatial * 0.0025;

    var dryGain = ctx.createGain();
    dryGain.gain.value = 1.0;

    src.connect(bass);
    bass.connect(mid);
    mid.connect(treble);
    treble.connect(splitter);

    merger.connect(dryGain);
    merger.connect(convolver);
    convolver.connect(reverbGain);

    dryGain.connect(gain);
    reverbGain.connect(gain);
    gain.connect(analyser);
    analyser.connect(ctx.destination);

    audioCtxRef.current = ctx;
    sourceRef.current = src;
    gainRef.current = gain;
    analyserRef.current = analyser;
    eqFiltersRef.current = { bass: bass, mid: mid, treble: treble };
    spatialRef.current = { widthGain: widthGain, reverbGain: reverbGain };
  }, []);

  var playSong = useCallback(function(index) {
    if (!songs || index < 0 || index >= songs.length) return;
    var song = songs[index];

    if (!audioCtxRef.current) initAudioCtx();
    var audio = audioRef.current;
    if (!audio) return;

    if (audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume();

    audio.src = song.blobUrl;
    audio.load();
    audio.play().then(function() {
      setPlayerState(function(prev) { return Object.assign({}, prev, { currentIndex: index, isPlaying: true }); });
      setCurrentSong(song);
    }).catch(function(err) {
      if (err.name !== 'AbortError') console.warn('Play failed:', err);
    });
  }, [songs, initAudioCtx]);

  var togglePlay = useCallback(function() {
    var audio = audioRef.current;
    if (!audio || !songs.length) return;
    var ps = stateRef.current;

    if (ps.currentIndex < 0) { playSong(0); return; }
    if (!audioCtxRef.current) initAudioCtx();
    if (audioCtxRef.current.state === 'suspended') audioCtxRef.current.resume();

    if (audio.paused) {
      audio.play().then(function() {
        setPlayerState(function(prev) { return Object.assign({}, prev, { isPlaying: true }); });
      });
    } else {
      audio.pause();
      setPlayerState(function(prev) { return Object.assign({}, prev, { isPlaying: false }); });
    }
  }, [songs, playSong, initAudioCtx]);

  var nextTrack = useCallback(function() {
    var ps = stateRef.current;
    if (!songs.length) return;
    var next;
    if (ps.shuffle) {
      next = Math.floor(Math.random() * songs.length);
      if (next === ps.currentIndex && songs.length > 1) next = (next + 1) % songs.length;
    } else {
      next = ps.currentIndex + 1;
      if (next >= songs.length) {
        if (ps.repeatMode === 'all') next = 0;
        else { setPlayerState(function(prev) { return Object.assign({}, prev, { isPlaying: false }); }); return; }
      }
    }
    playSong(next);
  }, [songs, playSong]);

  var prevTrack = useCallback(function() {
    var audio = audioRef.current;
    var ps = stateRef.current;
    if (!songs.length || !audio) return;
    if (audio.currentTime > 3) { audio.currentTime = 0; return; }
    var prev = ps.currentIndex - 1;
    playSong(prev < 0 ? songs.length - 1 : prev);
  }, [songs, playSong]);

  var seek = useCallback(function(time) {
    var audio = audioRef.current;
    if (audio) audio.currentTime = time;
  }, []);

  var setVolume = useCallback(function(vol) {
    var clamped = Math.max(0, Math.min(1, vol));
    if (gainRef.current) gainRef.current.gain.value = clamped;
    setPlayerState(function(prev) { return Object.assign({}, prev, { volume: clamped }); });
    setPersisted('player-volume', clamped);
  }, []);

  var setEQ = useCallback(function(band, value) {
    var clamped = Math.max(-15, Math.min(15, value));
    if (eqFiltersRef.current[band]) eqFiltersRef.current[band].gain.value = clamped;
    setPlayerState(function(prev) {
      var newEq = Object.assign({}, prev.eq);
      newEq[band] = clamped;
      setPersisted('eq-settings', newEq);
      return Object.assign({}, prev, { eq: newEq });
    });
  }, []);

  var setSpatial = useCallback(function(value) {
    var clamped = Math.max(0, Math.min(100, value));
    var spatial = spatialRef.current;
    if (spatial.widthGain) spatial.widthGain.gain.value = 1.0 + clamped * 0.015;
    if (spatial.reverbGain) spatial.reverbGain.gain.value = clamped * 0.0025;
    setPlayerState(function(prev) {
      setPersisted('spatial-settings', clamped);
      return Object.assign({}, prev, { spatial: clamped });
    });
  }, []);

  var toggleShuffle = useCallback(function() {
    setPlayerState(function(prev) { return Object.assign({}, prev, { shuffle: !prev.shuffle }); });
  }, []);

  var cycleRepeat = useCallback(function() {
    setPlayerState(function(prev) {
      var modes = ['off', 'one', 'all'];
      var next = modes[(modes.indexOf(prev.repeatMode) + 1) % 3];
      return Object.assign({}, prev, { repeatMode: next });
    });
  }, []);

  var toggleMute = useCallback(function() {
    setPlayerState(function(prev) {
      if (prev.volume > 0) {
        if (gainRef.current) gainRef.current.gain.value = 0;
        var r = Object.assign({}, prev, { _prevVolume: prev.volume, volume: 0 });
        return r;
      } else {
        var restore = prev._prevVolume || 0.8;
        if (gainRef.current) gainRef.current.gain.value = restore;
        return Object.assign({}, prev, { volume: restore });
      }
    });
  }, []);

  useEffect(function() {
    var audio = audioRef.current;
    if (!audio) return;

    var onTimeUpdate = function() {
      if (!isSeekingRef.current) {
        setTimeInfo({ current: audio.currentTime, duration: audio.duration || 0 });
      }
    };
    var onLoadedMeta = function() {
      setTimeInfo(function(prev) { return Object.assign({}, prev, { duration: audio.duration || 0 }); });
    };
    var onEnded = function() {
      var ps = stateRef.current;
      if (ps.repeatMode === 'one') {
        audio.currentTime = 0;
        audio.play();
      } else {
        nextTrack();
      }
    };

    audio.addEventListener('timeupdate', onTimeUpdate);
    audio.addEventListener('loadedmetadata', onLoadedMeta);
    audio.addEventListener('ended', onEnded);
    return function() {
      audio.removeEventListener('timeupdate', onTimeUpdate);
      audio.removeEventListener('loadedmetadata', onLoadedMeta);
      audio.removeEventListener('ended', onEnded);
    };
  }, [nextTrack]);

  return {
    playerState: playerState,
    timeInfo: timeInfo,
    currentSong: currentSong,
    audioRef: audioRef,
    analyserRef: analyserRef,
    playSong: playSong,
    togglePlay: togglePlay,
    nextTrack: nextTrack,
    prevTrack: prevTrack,
    seek: seek,
    setVolume: setVolume,
    setEQ: setEQ,
    setSpatial: setSpatial,
    toggleShuffle: toggleShuffle,
    cycleRepeat: cycleRepeat,
    toggleMute: toggleMute,
    isSeekingRef: isSeekingRef
  };
}

function createImpulseResponse(ctx, duration, decay) {
  var sampleRate = ctx.sampleRate;
  var length = sampleRate * duration;
  var buffer = ctx.createBuffer(2, length, sampleRate);
  for (var ch = 0; ch < 2; ch++) {
    var data = buffer.getChannelData(ch);
    for (var i = 0; i < length; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-(i / sampleRate) * decay);
    }
  }
  return buffer;
}

              React.createElement('div', { className: 'tab-panel' },
                React.createElement(ArtistHero, {
                  songs: displaySongs,
                  currentSong: engine.currentSong,
                  isPlaying: engine.playerState.isPlaying,
                  onPlayAll: handlePlayAll,
                  onLoadFolder: db.loadFolder,
                  folderName: db.folderName
                }),
                React.createElement('section', null,
                  React.createElement('div', { className: 'playlist-header' },
                    React.createElement('h2', null, displaySongs.length > 0 ? 'Top Playlist' : 'Playlist')
                  ),
                  React.createElement(SongList, {
                    songs: displaySongs,
                    currentIndex: engine.playerState.currentIndex,
                    onPlaySong: handlePlaySong,
                    loved: loved,
                    onLove: handleLove
                  })
                )
              ),

            activeTab === 'related' &&
              React.createElement('div', { className: 'tab-panel' },
                React.createElement(RelatedArtistTab, {
                  eq: engine.playerState.eq,
                  spatial: engine.playerState.spatial,
                  onEQChange: engine.setEQ,
                  onSpatialChange: engine.setSpatial,
                  analyserRef: engine.analyserRef
                })
              ),

            activeTab === 'lyrics' &&
              React.createElement('div', { className: 'tab-panel' },
                React.createElement(LyricsTab, {
                  lyrics: lyrics,
                  currentTime: engine.timeInfo.current
                })
              )
          )
    ),

    React.createElement(MiniPlayer, {
      engine: engine,
      onTabChange: setActiveTab
    }),

    React.createElement('audio', { ref: engine.audioRef, preload: 'auto', style: { display: 'none' } })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
